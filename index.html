<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="top-section">
        <div class="left-side">
            <a href="https://about.google/?fg=1&utm_source=google-GB&utm_medium=referral&utm_campaign=hp-header">About</a>
            <a href="https://store.google.com/gb/?utm_source=hp_header&utm_medium=google_ooo&utm_campaign=GS100042&hl=en-GB">Store</a>
        </div>
        <div class="right-side">
        <a href="https://mail.google.com/mail/u/0/#inbox">Gmail</a>
        <a href="https://www.google.com/imghp?hl=en&ogbl">Images</a>
        <img class="menu-icon" src="./images/9dots.png" alt="more"> 
        <img class="profile-pic" src="./images/googlelogo.webp" alt="profile">
        </div>
    </div>
    <div class="middle-section">
        <form class="search-form" action="https://www.google.com/search" method="GET">
            <a href="https://www.google.com/">
                <img 
                class="google-logo" 
                src="./images/mossle-logo-transparent.png" 
                alt="mossle logo"
                />
            </a>    
            <div class="search-form-input">

                <img
                    class="search-icon" 
                    src="./images/search.webp" 
                    alt="search"
                />
                <label for="search">Search</label>
                <input type="text" name="q" id="search" autocomplete="off" >
                <img 
                    class="mic-icon" 
                    src="./images/mic.webp" 
                    alt="mic"
                />
                <img 
                    class="camera-icon" 
                    src="./images/camera.webp" 
                    alt="camera"
                />
            </div>
            <div class="search-form-buttons">
                <button type="submit">Google Search</button>
                <button type="submit">I'm Feeling Lucky</button>
            </div>
        </form>
    </div>
    <div class="bottom-section">
        <div class ="bottom-top">
            United Kingdom
        </div>
        <div class="bottom-bottom">
            <div class="bottom-left">
                <a href="https://www.google.com/intl/en_uk/ads/?subid=ww-ww-et-g-awa-a-g_hpafoot1_1!o2&utm_source=google.com&utm_medium=referral&utm_campaign=google_hpafooter&fg=1">Advertising</a>
            <a href="https://www.google.com/services/?subid=ww-ww-et-g-awa-a-g_hpbfoot1_1!o2&utm_source=google.com&utm_medium=referral&utm_campaign=google_hpbfooter&fg=1">Business</a>
            <a href="https://google.com/search/howsearchworks/?fg=1">How Search works</a>
            </div>
            <div class="bottom-middle">
                <a href="https://ai.google/societal_impact/?utm_source=googlehpfooter&utm_medium=housepromos&utm_campaign=bottom-footer">Applying AI towards science and the environment</a>
            </div>
            <div class="bottom-right">
                <a href="https://policies.google.com/privacy?hl=en-GB&fg=1">Privacy</a>
                <a href="https://policies.google.com/terms?hl=en-GB&fg=1">Terms</a>
                <a href="https://www.google.com/settings">Settings</a>
            </div>
        </div>
        
        
    </div>
        

</body>
</html>
